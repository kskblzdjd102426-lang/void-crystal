<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <style>
    /* ═══════════════════════════════════════════
       🎨 CSS 配置区 —— 改颜色、改字体、改布局
       ═══════════════════════════════════════════ */

    /* 主色调，改这里就全局生效 */
    :root {
      --bg: {{CSS_BG}};
      --accent: {{CSS_ACCENT}};
      --accent-dim: {{CSS_ACCENT_DIM}};
      --text: {{CSS_TEXT}};
      --text-dim: {{CSS_TEXT_DIM}};
      --glass-bg: rgba(255,255,255,0.04);
      --glass-border: rgba(255,255,255,0.08);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      overflow: hidden;
      font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      user-select: none;
      height: 100dvh;
      width: 100vw;
      cursor: grab;
    }
    body.dragging { cursor: grabbing; }

    canvas { display: block; position: fixed; inset: 0; }

    /* ── UI 层：不改逻辑只改外观 ── */
    .ui-layer {
      position: fixed; inset: 0; pointer-events: none; z-index: 10;
      display: flex; flex-direction: column; justify-content: space-between;
      padding: clamp(16px, 4vw, 40px);
    }
    .ui-layer > * { pointer-events: auto; }

    .top-bar { display: flex; align-items: center; justify-content: space-between; }
    .logo {
      font-size: 1.25rem; font-weight: 700; letter-spacing: 0.05em;
      color: var(--text);
    }
    .logo span { color: var(--accent); }
    .nav-hint {
      font-size: 0.75rem; color: var(--text-dim);
      letter-spacing: 0.08em; text-transform: uppercase;
    }

    .product-card {
      align-self: center; max-width: 480px; width: 100%;
      background: var(--glass-bg); backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border); border-radius: 20px;
      padding: clamp(20px, 3vw, 32px);
      display: flex; flex-direction: column; gap: 12px;
      transition: border-color 0.5s;
    }
    .product-card:hover { border-color: rgba(255,255,255,0.18); }

    .product-card .badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--accent);
      background: {{CSS_BADGE_BG}};
      border: 1px solid {{CSS_BADGE_BORDER}};
      border-radius: 100px; padding: 4px 12px; width: fit-content;
    }
    .product-card .badge::before {
      content: ''; width: 6px; height: 6px;
      border-radius: 50%; background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
    }

    .product-card h1 {
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 700; color: #fff; letter-spacing: -0.02em; line-height: 1.2;
    }
    .product-card p {
      font-size: 0.9rem; color: var(--text-dim); line-height: 1.6;
    }

    .product-card .stats { display: flex; gap: 24px; margin-top: 4px; }
    .product-card .stat { display: flex; flex-direction: column; gap: 2px; }
    .product-card .stat-value { font-size: 1.1rem; font-weight: 700; color: #fff; }
    .product-card .stat-label {
      font-size: 0.65rem; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--text-dim);
    }

    .product-card .cta {
      margin-top: 8px;
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 22px; border-radius: 100px;
      background: var(--accent); color: #0a0a14;
      font-weight: 600; font-size: 0.85rem;
      border: none; cursor: pointer; letter-spacing: 0.02em;
      width: fit-content;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .product-card .cta:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 32px {{CSS_ACCENT_SHADOW}};
    }

    /* ── 鼠标跟随光圈 ── */
    .proximity-dot {
      position: fixed; width: 120px; height: 120px;
      border-radius: 50%;
      border: 1px solid {{CSS_PROXIMITY_RING}};
      background: radial-gradient(circle, {{CSS_PROXIMITY_GLOW}} 0%, transparent 70%);
      transform: translate(-50%, -50%);
      pointer-events: none; z-index: 5;
      opacity: 0; transition: opacity 0.3s;
    }
    .proximity-dot.visible { opacity: 1; }

    @media (max-width: 640px) {
      .ui-layer { padding: 16px; }
      .product-card { border-radius: 16px; padding: 20px; }
      .product-card .stats { gap: 16px; }
    }
  </style>
</head>
<body>

  <div class="proximity-dot" id="proximityDot"></div>

  <!-- ═══════════════════════════════════════════
       📝 HTML 配置区 —— 改文案、改布局
       ═══════════════════════════════════════════ -->
  <div class="ui-layer">
    <div class="top-bar">
      <div class="logo">{{LOGO_BEFORE}}<span>{{LOGO_ACCENT}}</span></div>
      <div class="nav-hint">拖拽旋转 &nbsp;·&nbsp; 滚轮缩放</div>
    </div>

    <div class="product-card">
      <div class="badge">{{BADGE_TEXT}}</div>
      <h1>{{HEADING}}</h1>
      <p>{{DESCRIPTION}}</p>
      <div class="stats">
        {{STATS_HTML}}
      </div>
      <button class="cta" id="ctaButton">{{CTA_TEXT}}</button>
    </div>
  </div>

  <!-- Three.js 从 CDN 加载 -->
  <script type="importmap">
  { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
  </script>

  <script type="module">
    import * as THREE from 'three';

    // ═══════════════════════════════════════════════════════
    // 🎛️  JS 配置区 —— 改 3D 参数的核心位置
    //    改颜色、形状、粒子数量、交互灵敏度都在这里
    // ═══════════════════════════════════════════════════════

    const CONFIG = {
      // ── 几何体 ──
      geometry: {
        type: '{{GEO_TYPE}}',      // icosahedron | sphere | torusKnot | box
        radius: {{GEO_RADIUS}},
        detail: {{GEO_DETAIL}},    // 细分度，越大越光滑（范围 20~120，大值吃性能）
        noiseStrength: {{GEO_NOISE}},  // 噪声扭曲强度（0 = 完美球体，0.5 = 很扭曲）
        noiseOctaves: {{GEO_OCTAVES}}, // 噪声细节层数（3~6，越多越丰富）
      },

      // ── 颜色（所有颜色都支持 #hex 或 rgb() ） ──
      colors: {
        baseGeometry:   '{{COLOR_BASE}}',     // 几何体基础色(远离鼠标时)
        proximityGlow:  '{{COLOR_PROXIMITY}}', // 鼠标靠近时的发光色
        edgeAccent:     '{{COLOR_EDGE}}',      // 边缘光晕色
        particle:       '{{COLOR_PARTICLE}}',  // 粒子颜色
        ring1:          '{{COLOR_RING1}}',     // 装饰环 1
        ring2:          '{{COLOR_RING2}}',     // 装饰环 2
        ring3:          '{{COLOR_RING3}}',     // 装饰环 3
      },

      // ── 光照 ──
      lights: {
        keyColor:  '{{LIGHT_KEY}}',   // 主光源颜色和强度
        keyIntensity: {{LIGHT_KEY_INT}},
        fillColor: '{{LIGHT_FILL}}',
        fillIntensity: {{LIGHT_FILL_INT}},
        rimColor:  '{{LIGHT_RIM}}',
        rimIntensity: {{LIGHT_RIM_INT}},
      },

      // ── 粒子 ──
      particles: {
        orbitCount: {{PARTICLE_ORBIT}},     // 轨道粒子数量（0~600）
        ambientCount: {{PARTICLE_AMBIENT}},  // 环境粒子数量（0~400）
        wireRings: {{PARTICLE_RINGS}},       // 装饰线框环数量（0~3）
      },

      // ── proximity 交互 ──
      proximity: {
        radius: {{PROX_RADIUS}},       // 影响范围（世界单位，1~3）
        strength: {{PROX_STRENGTH}},   // 变形强度（0~0.5，越大越鼓）
        particleAttraction: {{PROX_PARTICLE}}, // 粒子吸引力（0~1）
      },

      // ── 相机 ──
      camera: {
        defaultZoom: {{CAM_ZOOM}},    // 默认距离（3~12）
        minZoom: {{CAM_MIN_ZOOM}},
        maxZoom: {{CAM_MAX_ZOOM}},
        rotationSpeed: {{CAM_ROT_SPEED}},  // 0.003~0.01
        inertia: {{CAM_INERTIA}},          // 惯性衰减（2~6，越大越快停）
      },
    };

    // ═══════════════════════════════════════════════════════
    // 🧊 场景初始化（一般不需要改）
    // ═══════════════════════════════════════════════════════

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.prepend(renderer.domElement);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(
      40, window.innerWidth / window.innerHeight, 0.1, 50
    );
    camera.position.set(0, 0.3, CONFIG.camera.defaultZoom);
    camera.lookAt(0, 0, 0);

    // ── 灯光 ──
    scene.add(new THREE.AmbientLight(0x222244, 0.6));
    const keyLight   = new THREE.PointLight(CONFIG.lights.keyColor,  CONFIG.lights.keyIntensity, 15);
    const fillLight  = new THREE.PointLight(CONFIG.lights.fillColor, CONFIG.lights.fillIntensity, 12);
    const rimLight   = new THREE.PointLight(CONFIG.lights.rimColor,  CONFIG.lights.rimIntensity, 10);
    keyLight.position.set(3, 2, 4);
    fillLight.position.set(-3, -1, -2);
    rimLight.position.set(0, -3, 3);
    scene.add(keyLight, fillLight, rimLight);

    // ═══════════════════════════════════════════════════════
    // 🌊 3D 噪声函数 —— 用来生成不规则的有机形状
    //    类比 Blender 里连 Noise Texture → Set Position
    //    改噪声风格就是改 hash3D 的系数
    // ═══════════════════════════════════════════════════════

    function hash3D(x, y, z) {
      // 这三个大质数是噪声的"种子"，改它们会改变噪声花纹
      let h = x * 374761393 + y * 668265263 + z * 144067213;
      h = (h ^ (h >>> 13)) * 1274126177;
      return (h ^ (h >>> 16)) / 4294967296 + 0.5;
    }

    function noise3D(x, y, z) {
      const ix = Math.floor(x), iy = Math.floor(y), iz = Math.floor(z);
      const fx = x - ix, fy = y - iy, fz = z - iz;
      const sx = fx * fx * (3 - 2 * fx);  // smoothstep 平滑过渡
      const sy = fy * fy * (3 - 2 * fy);
      const sz = fz * fz * (3 - 2 * fz);
      const lerp = (a, b, t) => a + (b - a) * t;

      return lerp(
        lerp(lerp(hash3D(ix,iy,iz),       hash3D(ix+1,iy,iz),       sx),
             lerp(hash3D(ix,iy+1,iz),     hash3D(ix+1,iy+1,iz),     sx), sy),
        lerp(lerp(hash3D(ix,iy,iz+1),     hash3D(ix+1,iy,iz+1),     sx),
             lerp(hash3D(ix,iy+1,iz+1),   hash3D(ix+1,iy+1,iz+1),   sx), sy), sz
      );
    }

    // FBM（分形布朗运动）= 多层噪声叠加，像海浪一样丰富
    function fbm(x, y, z, octaves = 4) {
      let val = 0, amp = 1, freq = 1, max = 0;
      for (let i = 0; i < octaves; i++) {
        val += noise3D(x * freq, y * freq, z * freq) * amp;
        max += amp; amp *= 0.5; freq *= 2.0;
      }
      return val / max;
    }

    // ═══════════════════════════════════════════════════════
    // 🎨 GPU 着色器（Shader）
    //    这是整个页面最核心的技术 —— 在显卡上实时计算
    //    每个顶点的位置和每个像素的颜色
    //
    //    类比 Blender:
    //    vertexShader   = Geometry Nodes（控制顶点位置）
    //    fragmentShader = Shader Nodes （控制每个像素颜色）
    // ═══════════════════════════════════════════════════════

    const vertexShader = /* glsl */ `
      varying vec3 vWorldPos;
      varying vec3 vWorldNormal;
      varying vec3 vViewDir;
      varying float vProximity;

      uniform vec3  uProximityPoint;   // 鼠标在 3D 空间的位置
      uniform float uProximityRadius;  // 影响范围
      uniform float uProximityStrength;// 变形强度
      uniform float uTime;

      void main() {
        vec4 wp = modelMatrix * vec4(position, 1.0);

        // ── 🔥 PROXIMITY 核心逻辑 ──
        // 计算当前顶点到鼠标位置的距离
        float dist = distance(wp.xyz, uProximityPoint);
        // 距离越近 infl 越大（1=紧贴, 0=太远无视）
        float infl = 1.0 - smoothstep(0.0, uProximityRadius, dist);
        infl = pow(infl, 2.5);  // 让衰减更陡峭（像 Blender 的 Float Curve）

        // 微弱的有机波动（让物体看起来"活着"）
        float wave  = sin(position.x * 3.5 + uTime * 0.4)
                    * cos(position.z * 3.5 + uTime * 0.35) * 0.025;
        wave       += cos(position.y * 5.0 + uTime * 0.6)
                    * sin(position.x * 4.0 - uTime * 0.3) * 0.018;

        // 沿法线方向推出顶点（像 Blender 的 Extrude + Normal 节点）
        // infl 大 + strength 大 = 鼓包明显
        vec3 displaced = position + normal * (infl * uProximityStrength + wave);

        vec4 mvp = modelViewMatrix * vec4(displaced, 1.0);

        vWorldPos    = (modelMatrix * vec4(displaced, 1.0)).xyz;
        vWorldNormal = normalize(mat3(modelMatrix) * normal);
        vViewDir     = normalize(cameraPosition - vWorldPos);
        vProximity   = infl;

        gl_Position = projectionMatrix * mvp;
      }
    `;

    const fragmentShader = /* glsl */ `
      varying vec3 vWorldPos;
      varying vec3 vWorldNormal;
      varying vec3 vViewDir;
      varying float vProximity;

      uniform vec3 uProximityPoint;
      uniform float uProximityRadius;
      uniform vec3 uColor1;     // = CONFIG.colors.baseGeometry
      uniform vec3 uColor2;     // = CONFIG.colors.proximityGlow
      uniform vec3 uColor3;     // = CONFIG.colors.edgeAccent
      uniform vec3 uLightPos1, uLightPos2, uLightPos3;
      uniform float uTime;

      void main() {
        vec3 N = normalize(vWorldNormal);
        vec3 V = normalize(vViewDir);

        // fragment 级别的 proximity（覆盖整个表面的热力渐变）
        float fragDist = distance(vWorldPos, uProximityPoint);
        float fragInfl = 1.0 - smoothstep(0.0, uProximityRadius * 0.9, fragDist);
        float proximity = max(vProximity, fragInfl * 0.65);

        // ── 简易多光源 PBR ──
        vec3 L1 = normalize(uLightPos1 - vWorldPos);
        vec3 L2 = normalize(uLightPos2 - vWorldPos);
        vec3 L3 = normalize(uLightPos3 - vWorldPos);
        vec3 H1 = normalize(L1 + V), H2 = normalize(L2 + V);

        float diffuse  = max(dot(N,L1),0.0)*0.7 + max(dot(N,L2),0.0)*0.45 + max(dot(N,L3),0.0)*0.25;
        float specular = pow(max(dot(N,H1),0.0), 80.0)*0.55 + pow(max(dot(N,H2),0.0), 40.0)*0.25;

        // fresnel（边缘发光，任何角度看都有轮廓光）
        float fresnel = 1.0 - abs(dot(N, V));
        fresnel = pow(fresnel, 3.5);

        // ── 🔥 PROXIMITY 颜色混合 ──
        // 远离鼠标：uColor1（基础暗色）
        // 靠近鼠标：uColor2（暖色发光）
        // 紧贴鼠标：白色热力（pow(infl, 4.5) 让白色区域非常集中）
        vec3 base = mix(uColor1, uColor2, proximity);
        base = mix(base, vec3(1.0), pow(proximity, 4.5) * 0.55);

        vec3 ambient = base * 0.12;
        vec3 lit = base * (diffuse + ambient) + specular * 0.35;
        lit = mix(lit, uColor3, fresnel * 0.45);
        lit += proximity * 0.25;

        gl_FragColor = vec4(lit, 1.0);
      }
    `;

    // ═══════════════════════════════════════════════════════
    // 🏗️ 构建几何体 —— 这是"程序化 3D 建模"的 JS 实现
    //    改 CONFIG.geometry 就能换形状
    // ═══════════════════════════════════════════════════════

    const mainGroup = new THREE.Group();
    scene.add(mainGroup);

    // —— 根据 CONFIG 创建不同的几何体 ——
    function createBaseGeometry() {
      const g = CONFIG.geometry;
      let geo;
      switch (g.type) {
        case 'sphere':
          geo = new THREE.SphereGeometry(g.radius, g.detail, g.detail);
          break;
        case 'torusKnot':
          // TorusKnot 构造函数: (半径, 管半径, 径向分段, 管分段, p, q)
          geo = new THREE.TorusKnotGeometry(g.radius, 0.35, g.detail, 32, 3, 4);
          break;
        case 'box':
          geo = new THREE.BoxGeometry(g.radius*1.5, g.radius*1.5, g.radius*1.5, Math.floor(g.detail/4), Math.floor(g.detail/4), Math.floor(g.detail/4));
          break;
        default: // icosahedron
          geo = new THREE.IcosahedronGeometry(g.radius, g.detail);
      }
      return geo;
    }

    const baseGeo = createBaseGeometry();
    const posAttr = baseGeo.attributes.position;

    // —— 用 FBM 噪声扭曲每个顶点（程序化变形） ——
    // 这就是 Blender Geometry Nodes 的 JS 等价物！
    for (let i = 0; i < posAttr.count; i++) {
      const x = posAttr.getX(i), y = posAttr.getY(i), z = posAttr.getZ(i);
      const len = Math.sqrt(x*x + y*y + z*z);
      const nx = x / len, ny = y / len, nz = z / len;

      const n1 = fbm(nx * 2.5, ny * 2.5, nz * 2.5, CONFIG.geometry.noiseOctaves);
      const n2 = fbm(nx * 5.0 + 1.7, ny * 5.0 + 1.7, nz * 5.0, 3);

      // 晶体切面效果：增强棱角
      const theta = Math.atan2(ny, nx), phi = Math.acos(nz);
      const facet = Math.abs(Math.sin(theta * 7)) * Math.abs(Math.sin(phi * 5)) * 0.12;

      const displacement = (n1-0.5)*g.noiseStrength + (n2-0.5)*0.2 + facet;
      const newR = g.radius + displacement;

      posAttr.setXYZ(i, nx*newR, ny*newR, nz*newR);
    }
    baseGeo.computeVertexNormals();

    // —— 着色器材质 ——
    const mainUniforms = {
      uProximityPoint:    { value: new THREE.Vector3(999,999,999) },
      uProximityRadius:   { value: CONFIG.proximity.radius },
      uProximityStrength: { value: CONFIG.proximity.strength },
      uTime:              { value: 0 },
      uColor1:            { value: new THREE.Color(CONFIG.colors.baseGeometry) },
      uColor2:            { value: new THREE.Color(CONFIG.colors.proximityGlow) },
      uColor3:            { value: new THREE.Color(CONFIG.colors.edgeAccent) },
      uLightPos1:         { value: new THREE.Vector3(3,2,4) },
      uLightPos2:         { value: new THREE.Vector3(-3,-1,-2) },
      uLightPos3:         { value: new THREE.Vector3(0,-3,3) },
    };

    const mainMaterial = new THREE.ShaderMaterial({
      uniforms: mainUniforms,
      vertexShader, fragmentShader,
    });
    const mainMesh = new THREE.Mesh(baseGeo, mainMaterial);
    mainGroup.add(mainMesh);

    // —— 光晕层（additive blending，让 proximity 发光更明显） ——
    const glowGeo = createBaseGeometry();
    const gp = glowGeo.attributes.position;
    for (let i = 0; i < gp.count; i++) {
      gp.setXYZ(i, posAttr.getX(i)*1.06, posAttr.getY(i)*1.06, posAttr.getZ(i)*1.06);
    }
    glowGeo.computeVertexNormals();

    const glowMat = new THREE.ShaderMaterial({
      uniforms: {
        uProximityPoint: mainUniforms.uProximityPoint,
        uProximityRadius: { value: CONFIG.proximity.radius * 1.15 },
        uProximityStrength: { value: CONFIG.proximity.strength },
        uColor2: { value: new THREE.Color(CONFIG.colors.proximityGlow) },
        uTime: mainUniforms.uTime,
      },
      vertexShader: /* glsl */ `
        varying vec3 vWorldPos;
        uniform vec3 uProximityPoint;
        uniform float uProximityRadius, uProximityStrength, uTime;
        void main() {
          vec4 wp = modelMatrix * vec4(position, 1.0);
          float dist = distance(wp.xyz, uProximityPoint);
          float infl = 1.0 - smoothstep(0.0, uProximityRadius*1.3, dist);
          infl = pow(infl, 1.8);
          vec3 displaced = position + normal * (infl * uProximityStrength * 1.3);
          vWorldPos = (modelMatrix * vec4(displaced, 1.0)).xyz;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(displaced, 1.0);
        }
      `,
      fragmentShader: /* glsl */ `
        varying vec3 vWorldPos;
        uniform vec3 uProximityPoint;
        uniform float uProximityRadius;
        uniform vec3 uColor2;
        void main() {
          float dist = distance(vWorldPos, uProximityPoint);
          float infl = 1.0 - smoothstep(0.0, uProximityRadius*1.4, dist);
          infl = pow(infl, 2.5);
          gl_FragColor = vec4(mix(uColor2, vec3(1.0), infl*0.7), infl*0.35);
        }
      `,
      transparent: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
    });
    mainGroup.add(new THREE.Mesh(glowGeo, glowMat));

    // ═══════════════════════════════════════════════════════
    // ✨ 粒子系统
    //    - 轨道粒子：围绕几何体旋转，被鼠标吸引
    //    - 环境粒子：自由漂浮在周围
    //    - 线框环：装饰性环
    // ═══════════════════════════════════════════════════════

    // —— 轨道粒子 ——
    const ORBIT_COUNT = CONFIG.particles.orbitCount;
    const orbitGeo = new THREE.BufferGeometry();
    const orbitPositions = new Float32Array(ORBIT_COUNT * 3);
    const orbitBase = new Float32Array(ORBIT_COUNT * 3);

    function createRing(base, count, ringR, tiltX, tiltZ, yS) {
      for (let i = 0; i < count; i++) {
        const angle = (i/count) * Math.PI*2 + (Math.random()-0.5)*0.3;
        const r = ringR + (Math.random()-0.5)*0.6;
        let x = Math.cos(angle)*r, y = (Math.random()-0.5)*yS, z = Math.sin(angle)*r;
        const [cy,cz] = [y*Math.cos(tiltX)-z*Math.sin(tiltX), y*Math.sin(tiltX)+z*Math.cos(tiltX)];
        [y,z] = [cy,cz];
        const [cx,cy2] = [x*Math.cos(tiltZ)-y*Math.sin(tiltZ), x*Math.sin(tiltZ)+y*Math.cos(tiltZ)];
        [x,y] = [cx,cy2];
        const idx = i*3; base[idx]=x; base[idx+1]=y; base[idx+2]=z;
      }
    }
    const r = CONFIG.particles;
    if (r.orbitCount > 0) {
      const perRing = Math.floor(r.orbitCount / 3);
      createRing(orbitBase, perRing, 2.3, 0.3, 0.0, 0.25);
      createRing(orbitBase, Math.floor(r.orbitCount * 0.325), 2.1, -0.5, 0.8, 0.2);
      createRing(orbitBase, Math.floor(r.orbitCount * 0.325), 2.5, 0.8, -0.6, 0.3);
      orbitPositions.set(orbitBase);
      orbitGeo.setAttribute('position', new THREE.BufferAttribute(orbitPositions, 3));
      const orbitPts = new THREE.Points(orbitGeo, new THREE.PointsMaterial({
        color: CONFIG.colors.particle, size: 0.025,
        blending: THREE.AdditiveBlending, depthWrite: false, transparent: true, opacity: 0.7,
      }));
      mainGroup.add(orbitPts);
    }

    // —— 环境漂浮粒子 ——
    const AMBIENT_COUNT = CONFIG.particles.ambientCount;
    let ambientPoints;
    const ambientGeo = new THREE.BufferGeometry();
    const ambientPositions = new Float32Array(AMBIENT_COUNT * 3);
    const ambientBase = new Float32Array(AMBIENT_COUNT * 3);
    for (let i = 0; i < AMBIENT_COUNT; i++) {
      const theta = Math.random()*Math.PI*2, phi = Math.acos(2*Math.random()-1);
      const rr = 2.2 + Math.random()*2.5;
      ambientBase[i*3]   = Math.sin(phi)*Math.cos(theta)*rr;
      ambientBase[i*3+1] = Math.sin(phi)*Math.sin(theta)*rr;
      ambientBase[i*3+2] = Math.cos(phi)*rr;
    }
    ambientPositions.set(ambientBase);
    ambientGeo.setAttribute('position', new THREE.BufferAttribute(ambientPositions, 3));
    ambientPoints = new THREE.Points(ambientGeo, new THREE.PointsMaterial({
      color: 0x7799cc, size: 0.018,
      blending: THREE.AdditiveBlending, depthWrite: false, transparent: true, opacity: 0.5,
    }));
    mainGroup.add(ambientPoints);

    // —— 装饰线框环 ——
    function addWireRing(radius, tiltX, tiltZ, color, opacity) {
      const ring = new THREE.Mesh(
        new THREE.TorusGeometry(radius, 0.008, 16, 180),
        new THREE.MeshBasicMaterial({ color, transparent: true, opacity, depthWrite: false })
      );
      ring.rotation.set(tiltX, 0, tiltZ);
      mainGroup.add(ring);
    }
    const wc = [CONFIG.colors.ring1, CONFIG.colors.ring2, CONFIG.colors.ring3];
    const wr = [{r:2.15, tx:Math.PI*0.45, tz:0.2}, {r:2.05, tx:-Math.PI*0.35, tz:0.6}, {r:2.25, tx:Math.PI*0.15, tz:-0.4}];
    for (let i = 0; i < CONFIG.particles.wireRings; i++) {
      addWireRing(wr[i].r, wr[i].tx, wr[i].tz, wc[i], 0.25 - i*0.03);
    }

    // ═══════════════════════════════════════════════════════
    // 🖱️ 鼠标交互
    //    ① mousemove → 屏幕坐标转 3D 射线 → 投影到平面 → proximity 点
    //    ② drag → 旋转几何体 + 惯性动量
    //    ③ wheel → 缩放相机
    // ═══════════════════════════════════════════════════════

    const mouse = new THREE.Vector2();
    const mouseWorld = new THREE.Vector3();
    const raycaster = new THREE.Raycaster();
    const proxyPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);

    let isDragging = false, prevMouse = new THREE.Vector2();
    let rotVelocity = new THREE.Vector2();
    let targetRotX = 0, targetRotY = 0, currentRotX = 0, currentRotY = 0;
    let targetZoom = CONFIG.camera.defaultZoom, currentZoom = CONFIG.camera.defaultZoom;

    function updateMouse3D() {
      raycaster.setFromCamera(mouse, camera);
      const target = new THREE.Vector3();
      raycaster.ray.intersectPlane(proxyPlane, target);
      if (target) mouseWorld.copy(target);
    }

    const proxyDot = document.getElementById('proximityDot');
    let dotVisible = false;

    window.addEventListener('pointerdown', e => {
      isDragging = true; document.body.classList.add('dragging');
      prevMouse.set(e.clientX, e.clientY); rotVelocity.set(0, 0);
    });
    window.addEventListener('pointermove', e => {
      mouse.set((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
      updateMouse3D();
      proxyDot.style.left = e.clientX + 'px';
      proxyDot.style.top = e.clientY + 'px';
      if (isDragging) {
        const dx = e.clientX - prevMouse.x, dy = e.clientY - prevMouse.y;
        targetRotY += dx * CONFIG.camera.rotationSpeed;
        targetRotX += dy * CONFIG.camera.rotationSpeed;
        targetRotX = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, targetRotX));
        rotVelocity.set(dx*CONFIG.camera.rotationSpeed, dy*CONFIG.camera.rotationSpeed);
        prevMouse.set(e.clientX, e.clientY);
      }
    });
    window.addEventListener('pointerup', () => { isDragging = false; document.body.classList.remove('dragging'); });
    window.addEventListener('pointerleave', () => { isDragging = false; document.body.classList.remove('dragging'); });
    window.addEventListener('wheel', e => {
      e.preventDefault();
      targetZoom = Math.max(CONFIG.camera.minZoom, Math.min(CONFIG.camera.maxZoom, targetZoom + e.deltaY*0.005));
    }, { passive: false });

    // Touch（手机）
    window.addEventListener('touchstart', e => {
      if (e.touches.length === 1) {
        isDragging = true; document.body.classList.add('dragging');
        prevMouse.set(e.touches[0].clientX, e.touches[0].clientY); rotVelocity.set(0,0);
      }
    }, { passive: false });
    window.addEventListener('touchmove', e => {
      e.preventDefault();
      if (isDragging && e.touches.length === 1) {
        const dx = e.touches[0].clientX - prevMouse.x, dy = e.touches[0].clientY - prevMouse.y;
        targetRotY += dx*CONFIG.camera.rotationSpeed;
        targetRotX += dy*CONFIG.camera.rotationSpeed;
        rotVelocity.set(dx*CONFIG.camera.rotationSpeed, dy*CONFIG.camera.rotationSpeed);
        prevMouse.set(e.touches[0].clientX, e.touches[0].clientY);
      }
    }, { passive: false });
    window.addEventListener('touchend', () => { isDragging = false; document.body.classList.remove('dragging'); });

    // ═══════════════════════════════════════════════════════
    // 🔄 动画循环 —— 每一帧更新 60 次
    // ═══════════════════════════════════════════════════════

    const clock = new THREE.Clock();

    function animate(t) {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.1);
      const time = t * 0.001;

      // —— 旋转（带惯性衰减） ——
      if (!isDragging) {
        // exponential decay: velocity *= e^(-inertia * dt)
        rotVelocity.x *= Math.exp(-CONFIG.camera.inertia * dt);
        rotVelocity.y *= Math.exp(-CONFIG.camera.inertia * dt);
        targetRotX += rotVelocity.y; targetRotY += rotVelocity.x;
        targetRotX = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, targetRotX));
      }
      const rotSpring = 8.0;
      currentRotX += (targetRotX - currentRotX) * rotSpring * dt;
      currentRotY += (targetRotY - currentRotY) * rotSpring * dt;
      mainGroup.rotation.set(currentRotX, currentRotY, 0);

      // —— 缩放 ——
      currentZoom += (targetZoom - currentZoom) * 6.0 * dt;
      camera.position.z = currentZoom;

      // —— 更新 shader uniform ——
      mainUniforms.uTime.value = time;
      mainUniforms.uProximityPoint.value.copy(mouseWorld);

      // —— 鼠标跟随光圈 ——
      const d = mouseWorld.length();
      const show = d < 3.0 && !isDragging;
      if (show !== dotVisible) { dotVisible = show; proxyDot.classList.toggle('visible', show); }

      // —— 轨道粒子被鼠标吸引 ——
      const localProx = mouseWorld.clone();
      mainGroup.worldToLocal(localProx);
      const px = localProx.x, py = localProx.y, pz = localProx.z;
      for (let i = 0; i < ORBIT_COUNT; i++) {
        const i3 = i*3, bx = orbitBase[i3], by = orbitBase[i3+1], bz = orbitBase[i3+2];
        const dd = Math.sqrt((px-bx)**2 + (py-by)**2 + (pz-bz)**2) + 0.01;
        const force = CONFIG.proximity.particleAttraction / (0.5 + dd*dd);
        orbitPositions[i3]   = bx + (px-bx)/dd*force + Math.cos(time*0.3+i*0.1)*0.004;
        orbitPositions[i3+1] = by + (py-by)/dd*force + Math.sin(time*0.21+i*0.13)*0.004;
        orbitPositions[i3+2] = bz + (pz-bz)/dd*force;
      }
      if (ORBIT_COUNT > 0) orbitGeo.attributes.position.needsUpdate = true;

      // —— 环境粒子漂浮 ——
      for (let i = 0; i < AMBIENT_COUNT; i++) {
        const i3 = i*3;
        ambientPositions[i3]   = ambientBase[i3]   + Math.sin(time*0.7+i*0.3)*0.15;
        ambientPositions[i3+1] = ambientBase[i3+1] + Math.cos(time*0.5+i*0.4)*0.15;
        ambientPositions[i3+2] = ambientBase[i3+2] + Math.sin(time*0.6+i*0.35)*0.15;
      }
      ambientGeo.attributes.position.needsUpdate = true;

      // —— 灯光呼吸效果 ——
      keyLight.intensity = CONFIG.lights.keyIntensity + Math.sin(time*0.8)*10;
      rimLight.intensity  = CONFIG.lights.rimIntensity + Math.cos(time*0.6)*5;

      renderer.render(scene, camera);
    }

    // CTA 按钮：重置视角
    document.getElementById('ctaButton').addEventListener('click', () => {
      targetRotX = 0; targetRotY = 0;
      targetZoom = CONFIG.camera.defaultZoom;
      rotVelocity.set(0,0);
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    mouse.set(0,0); updateMouse3D();
    requestAnimationFrame(animate);

    console.log('%c🚀 3D Showcase %cReady',
      'font-size:1.2em;color:' + CONFIG.colors.proximityGlow + ';', 'color:#aaa;');
  </script>
</body>
</html>
